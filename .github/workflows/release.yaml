name: Release PowerSync

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g., 1.0.0 or 1.0.0-Beta.1)"
        required: true
        type: string
      release_notes:
        description: "Release notes"
        required: true
        type: string

permissions: {}

jobs:
  build:
    uses: ./.github/workflows/build_and_test.yaml

  release:
    permissions:
      contents: write # To create the release
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate version format and set prerelease flag
        id: version_check
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+(-Beta\.[0-9]+)?$ ]]; then
            if [[ $VERSION =~ -Beta\.[0-9]+$ ]]; then
              echo "is_prerelease=true" >> $GITHUB_OUTPUT
              echo "Version is valid Beta format"
            else
              echo "is_prerelease=false" >> $GITHUB_OUTPUT
              echo "Version is valid release format"
            fi
          else
            echo "Invalid version format. Must be either:"
            echo "- Release version: X.Y.Z (e.g., 1.0.0)"
            echo "- Beta version: X.Y.Z-Beta.N (e.g., 1.0.0-Beta.1)"
            exit 1
          fi

      - name: Create GitHub Release
        if: ${{ !steps.version_check.outputs.is_prerelease }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.version }}
          NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          gh release create $TAG --notes $NOTES
      - name: Create GitHub Pre-Release
        if: ${{ steps.version_check.outputs.is_prerelease }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.version }}
          NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          gh release create $TAG --notes $NOTES -p
